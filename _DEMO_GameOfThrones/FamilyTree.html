<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра Престолов — Генеалогическое Древо</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #08080f;
    --bg-mid: #0f0f1a;
    --bg-card: #13131f;
    --bg-panel: #0a0a14;
    --gold: #c9a227;
    --gold-light: #e8c84a;
    --gold-dim: #7a6218;
    --silver: #8fa8b8;
    --text-main: #d4c9a8;
    --text-dim: #7a7060;
    --border: rgba(201,162,39,0.2);
    --glow: rgba(201,162,39,0.15);

    --stark: #4a7fa5;
    --stark-glow: rgba(74,127,165,0.4);
    --lannister: #c9a227;
    --lannister-glow: rgba(201,162,39,0.4);
    --targaryen: #c0392b;
    --targaryen-glow: rgba(192,57,43,0.4);
    --baratheon: #2c3e50;
    --baratheon-glow: rgba(44,62,80,0.6);
    --martell: #e67e22;
    --martell-glow: rgba(230,126,34,0.4);
    --tyrell: #27ae60;
    --tyrell-glow: rgba(39,174,96,0.4);
    --other: #6c5f7a;
    --other-glow: rgba(108,95,122,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: 'EB Garamond', Georgia, serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 18px 24px 12px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(15,10,5,0.98) 0%, transparent 100%);
    flex-shrink: 0;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-ornament {
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    letter-spacing: 8px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 700;
    background: linear-gradient(135deg, #a07820 0%, #e8c84a 40%, #c9a227 60%, #7a5a10 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    line-height: 1.1;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'Cinzel', serif;
  }

  /* Controls */
  .controls {
    position: absolute;
    top: 14px;
    right: 20px;
    display: flex;
    gap: 8px;
    align-items: center;
    z-index: 20;
  }

  .btn {
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: rgba(201,162,39,0.05);
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,162,39,0.1); }
  .btn.active { border-color: var(--gold); color: var(--gold-light); background: rgba(201,162,39,0.15); }

  /* House filter pills */
  .house-filters {
    position: absolute;
    top: 14px;
    left: 20px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    z-index: 20;
    max-width: 360px;
  }

  .house-pill {
    padding: 3px 10px;
    border-radius: 2px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.25s;
    border: 1px solid;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .house-pill:hover, .house-pill.active { opacity: 1; }
  .house-pill[data-house="Старк"] { color: var(--stark); border-color: var(--stark); }
  .house-pill[data-house="Ланнистер"] { color: var(--lannister); border-color: var(--lannister); }
  .house-pill[data-house="Таргариен"] { color: var(--targaryen); border-color: var(--targaryen); }
  .house-pill[data-house="Баратеон"] { color: #aab8c8; border-color: #aab8c8; }
  .house-pill[data-house="Мартелл"] { color: var(--martell); border-color: var(--martell); }
  .house-pill[data-house="Тирелл"] { color: var(--tyrell); border-color: var(--tyrell); }
  .house-pill[data-house="other"] { color: var(--silver); border-color: var(--silver); }

  /* Main canvas area */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph-svg {
    width: 100%;
    height: 100%;
  }

  /* Side panel */
  #side-panel {
    width: 300px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--bg-panel);
    overflow-y: auto;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }

  #side-panel.hidden {
    transform: translateX(300px);
    width: 0;
    border: none;
    overflow: hidden;
  }

  #side-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--house-color, var(--gold));
    transition: background 0.3s;
  }

  .panel-inner {
    padding: 24px 20px;
  }

  .panel-house-badge {
    display: inline-block;
    padding: 2px 8px;
    border: 1px solid var(--house-color, var(--gold));
    color: var(--house-color, var(--gold));
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .panel-name {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: #f0e8d0;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .panel-nick {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  .panel-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--house-color, var(--gold)), transparent);
    margin: 14px 0;
    opacity: 0.4;
  }

  .panel-section-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .panel-stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }

  .panel-stat-label {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.5px;
  }

  .panel-stat-value {
    font-size: 14px;
    color: var(--text-main);
    text-align: right;
    max-width: 160px;
  }

  .panel-bio {
    font-size: 13.5px;
    line-height: 1.7;
    color: #b0a890;
    font-style: italic;
  }

  .panel-titles {
    font-size: 12px;
    color: var(--text-main);
    line-height: 1.6;
  }

  .status-alive { color: #4caf7d; }
  .status-dead { color: #b05050; }

  .close-panel {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: color 0.2s;
  }
  .close-panel:hover { color: var(--gold); }

  /* Timeline */
  #timeline-container {
    height: 80px;
    border-top: 1px solid var(--border);
    background: var(--bg-mid);
    padding: 0 40px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  #timeline-svg {
    width: 100%;
    height: 100%;
  }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 90px;
    left: 20px;
    display: flex;
    gap: 16px;
    z-index: 10;
    pointer-events: none;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .legend-line {
    width: 20px;
    height: 1px;
  }

  /* SVG styles */
  .node-circle {
    cursor: pointer;
    transition: filter 0.2s;
  }
  .node-circle:hover { filter: brightness(1.3); }

  .node-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    fill: #c8bfa8;
    pointer-events: none;
    text-anchor: middle;
  }

  .node-years {
    font-family: 'EB Garamond', serif;
    font-size: 10px;
    fill: #6a6050;
    pointer-events: none;
    text-anchor: middle;
  }

  .link-parent { stroke-opacity: 0.5; fill: none; stroke-width: 1.5; }
  .link-marriage { stroke-opacity: 0.3; fill: none; stroke-width: 1; stroke-dasharray: 4 3; }

  /* Scroll styles */
  #side-panel::-webkit-scrollbar { width: 4px; }
  #side-panel::-webkit-scrollbar-track { background: transparent; }
  #side-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Zoom hint */
  .zoom-hint {
    position: absolute;
    bottom: 90px;
    right: 20px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
  }

  .timeline-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    fill: var(--text-dim);
    text-anchor: middle;
  }

  .timeline-event-label {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 10px;
    fill: var(--text-dim);
  }

  /* Fade in */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }
  .panel-inner > * {
    animation: fadeIn 0.3s ease forwards;
  }
</style>
</head>

</div>

<div id="timeline-container">

</div>

    titles: 'Королева Вестероса', nick: '', bio: 'Трижды была королевой. Погибла во взрыве Септа.', cause: 'Взрыв Великого Септа' },
  { id: 'Littlefinger', name: 'Петир Бейлиш', house: 'Бейлиш', born: 268, died: 305, gender: 'm',
    titles: 'Лорд Харенхолла', nick: 'Мизинец', bio: 'Выстроил хаос как лестницу. Казнён Сансой.', cause: 'Казнён по приказу Сансы' },
  { id: 'Varys', name: 'Варис', house: '—', born: 260, died: 305, gender: 'm',
    titles: 'Мастер Шептунов', nick: 'Паук', bio: 'Служил королевству — не королям. Сожжён Дейенерис.', cause: 'Сожжён по приказу Дейенерис' },
];

// Parent-child links
const parentLinks = [
  // Starks
  { source: 'Rickard', target: 'Ned' },
  { source: 'Rickard', target: 'Lyanna' },
  { source: 'Ned', target: 'Robb' },
  { source: 'Ned', target: 'Sansa' },
  { source: 'Ned', target: 'Arya' },
  { source: 'Ned', target: 'Bran' },
  { source: 'Catelyn', target: 'Robb' },
  { source: 'Catelyn', target: 'Sansa' },
  { source: 'Catelyn', target: 'Arya' },
  { source: 'Catelyn', target: 'Bran' },
  // Jon's real parents
  { source: 'Rhaegar', target: 'Jon' },
  { source: 'Lyanna', target: 'Jon' },
  // Targaryens
  { source: 'Aerys', target: 'Rhaegar' },
  { source: 'Aerys', target: 'Daenerys' },
  { source: 'Aerys', target: 'Viserys' },
  // Rhaegar + Elia
  { source: 'Rhaegar', target: 'Joffrey' }, // fake

  { source: 'Tywin', target: 'Cersei' },
  { source: 'Tywin', target: 'Jaime' },
  { source: 'Tywin', target: 'Tyrion' },
  { source: 'Jaime', target: 'Joffrey' },
  { source: 'Cersei', target: 'Joffrey' },
  // Baratheons
  { source: 'Robert', target: 'Stannis' }, // brothers – skip parental
];

// Marriage links
const marriageLinks = [
  { source: 'Ned', target: 'Catelyn' },
  { source: 'Robert', target: 'Cersei' },
  { source: 'Tywin', target: 'Cersei' }, // not real, skip
  { source: 'Rhaegar', target: 'Lyanna' },
  { source: 'Rhaegar', target: 'Elia' },
  { source: 'Joffrey', target: 'Margaery' },
  { source: 'Jon', target: 'Daenerys' },
  { source: 'Aerys', target: 'Daenerys' }, // skip
];

const timelineEvents = [
  { year: 258, label: 'Война Девяти Пени', color: '#c0392b' },
  { year: 282, label: 'Война Узурпатора', color: '#c0392b' },
  { year: 283, label: 'Рождение Джона', color: '#9b4f8a' },
  { year: 298, label: 'Гибель Роберта и Неда', color: '#c0392b' },
  { year: 299, label: 'Красная Свадьба', color: '#c0392b' },

];

// ============================================================
// SETUP
// ============================================================
const svg = d3.select('#graph-svg');
const width = () => document.getElementById('graph-container').clientWidth;
const height = () => document.getElementById('graph-container').clientHeight;

const g = svg.append('g').attr('class', 'main-group');
const zoom = d3.zoom().scaleExtent([0.2, 3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

// Defs
const defs = svg.append('defs');
Object.entries(HOUSES).forEach(([house, {color}]) => {
  const filter = defs.append('filter').attr('id', `glow-${house.replace(/\//g,'-').replace(/\s/g,'-')}`);
  filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
  const merge = filter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'blur');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');
  // radial gradient for node
  const grad = defs.append('radialGradient').attr('id', `grad-${house.replace(/\//g,'-').replace(/\s/g,'-')}`);
  grad.append('stop').attr('offset','0%').attr('stop-color', d3.color(color).brighter(0.5));
  grad.append('stop').attr('offset','100%').attr('stop-color', d3.color(color).darker(1));
});

// ============================================================
// HOUSE FILTER PILLS
// ============================================================
const allHouses = [...new Set(persons.map(p => p.house))];
const filtersEl = document.getElementById('houseFilters');
allHouses.forEach(house => {
  const pill = document.createElement('div');
  pill.className = 'house-pill active';
  pill.dataset.house = house;
  const h = HOUSES[house] || HOUSES['—'];
  pill.style.color = h.color;
  pill.style.borderColor = h.color;
  pill.textContent = (h.sigil || '') + ' ' + house;
  pill.onclick = () => toggleHouse(house);
  filtersEl.appendChild(pill);
});

const activeHouses = new Set(allHouses);
function toggleHouse(house) {
  const pill = document.querySelector(`.house-pill[data-house="${house}"]`);
  if (activeHouses.has(house)) {
    activeHouses.delete(house);
    pill.classList.remove('active');
  } else {
    activeHouses.add(house);
    pill.classList.add('active');
  }
  updateVisibility();
}
function updateVisibility() {
  nodeGroup.selectAll('.node').style('opacity', d => activeHouses.has(d.house) ? 1 : 0.1);
  linkGroup.selectAll('.link-parent').style('opacity', d => {
    const s = persons.find(p => p.id === d.source.id || p.id === d.source);
    const t = persons.find(p => p.id === d.target.id || p.id === d.target);
    return (s && activeHouses.has(s.house) && t && activeHouses.has(t.house)) ? 0.5 : 0.03;
  });
  linkGroup.selectAll('.link-marriage').style('opacity', d => {
    const s = persons.find(p => p.id === d.source.id || p.id === d.source);
    const t = persons.find(p => p.id === d.target.id || p.id === d.target);
    return (s && activeHouses.has(s.house) && t && activeHouses.has(t.house)) ? 0.35 : 0.03;
  });
}

// ============================================================
// FORCE SIMULATION
// ============================================================
let simulation;
const linkGroup = g.append('g').attr('class', 'links');
const nodeGroup = g.append('g').attr('class', 'nodes');

function buildForceGraph() {
  if (simulation) simulation.stop();

  const nodes = persons.map(p => ({...p}));
  const pLinks = parentLinks.map(l => ({...l, type: 'parent'}));
  const mLinks = marriageLinks.map(l => ({...l, type: 'marriage'}));
  const links = [...pLinks, ...mLinks];

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => d.type === 'marriage' ? 80 : 110).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width()/2, height()/2))
    .force('collision', d3.forceCollide(50));

  drawGraph(nodes, links, false);
  simulation.on('tick', () => updatePositions(false));
  setTimeout(() => simulation.stop(), 4000);
}

function buildTreeLayout() {
  if (simulation) simulation.stop();

  // Manual hierarchical positions by generation
  const generations = {
    0: ['Aerys', 'Tywin', 'Rickard'],
    1: ['Rhaegar', 'Cersei', 'Jaime', 'Tyrion', 'Ned', 'Catelyn', 'Lyanna', 'Robert', 'Stannis', 'Oberyn', 'Elia'],
    2: ['Jon', 'Joffrey', 'Daenerys', 'Viserys', 'Robb', 'Sansa', 'Arya', 'Bran', 'Margaery'],
    3: ['Littlefinger', 'Varys'],
  };

  const nodes = persons.map(p => {
    let gen = -1, idx = -1;
    for (const [g, ids] of Object.entries(generations)) {
      const i = ids.indexOf(p.id);
      if (i >= 0) { gen = parseInt(g); idx = i; break; }
    }
    const genIds = generations[gen] || [];
    const totalInGen = genIds.length;
    const w = width();
    const h = height();
    const padding = 80;
    const x = gen >= 0 ? padding + (idx / Math.max(totalInGen - 1, 1)) * (w - padding*2) : w/2;
    const y = gen >= 0 ? 60 + (gen / 3) * (h - 120) : h/2;
    return {...p, x, y, fx: x, fy: y};
  });

  const pLinks = parentLinks.map(l => ({...l, type: 'parent'}));
  const mLinks = marriageLinks.map(l => ({...l, type: 'marriage'}));
  const links = [...pLinks, ...mLinks];

  drawGraph(nodes, links, true);
  updatePositions(true);
}

function drawGraph(nodes, links, isTree) {
  linkGroup.selectAll('*').remove();
  nodeGroup.selectAll('*').remove();

  // Links
  const parentL = linkGroup.selectAll('.link-parent')
    .data(links.filter(l => l.type === 'parent'))
    .join('path')
    .attr('class', 'link-parent')
    .attr('stroke', d => {
      const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target);
      return t ? (HOUSES[t.house]?.color || '#888') : '#888';
    });

  const marriageL = linkGroup.selectAll('.link-marriage')
    .data(links.filter(l => l.type === 'marriage'))
    .join('line')
    .attr('class', 'link-marriage')
    .attr('stroke', '#c9a227');

  // Nodes
  const node = nodeGroup.selectAll('.node')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .style('cursor', 'pointer')
    .on('click', (e, d) => openPanel(d))
    .call(d3.drag()
      .on('start', (e, d) => { if (!isTree && !e.active) simulation?.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!isTree && !e.active) simulation?.alphaTarget(0); if (!isTree) { d.fx = null; d.fy = null; } }));

  const R = 24;
  const houseKey = d => d.house.replace(/\//g,'-').replace(/\s/g,'-');

  // Glow ring
  node.append('circle')
    .attr('r', R + 5)
    .attr('fill', 'none')
    .attr('stroke', d => HOUSES[d.house]?.color || '#888')
    .attr('stroke-opacity', 0.15)
    .attr('stroke-width', 1);

  // Main circle
  node.append('circle')
    .attr('r', R)
    .attr('fill', d => `url(#grad-${houseKey(d)})`)
    .attr('stroke', d => HOUSES[d.house]?.color || '#888')
    .attr('stroke-width', d => d.died ? 1 : 2.5)
    .attr('stroke-opacity', d => d.died ? 0.5 : 0.9)
    .attr('filter', d => `url(#glow-${houseKey(d)})`)
    .style('opacity', d => d.died ? 0.75 : 1);

  // Dead X
  node.filter(d => d.died !== null).append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-size', '16px')
    .attr('fill', 'rgba(255,255,255,0.25)')
    .text('✕');

  // Gender icon
  node.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-size', '14px')
    .attr('fill', 'rgba(255,255,255,0.7)')
    .text(d => d.gender === 'm' ? '♂' : '♀');

  // Name label
  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', R + 16)
    .text(d => d.name.split(' ').slice(0,2).join(' '))
    .attr('fill', d => HOUSES[d.house]?.color || '#c8bfa8');

  // Nick
  node.filter(d => d.nick).append('text')
    .attr('class', 'node-label')
    .attr('dy', R + 27)
    .attr('font-size', '9px')
    .attr('font-style', 'italic')
    .attr('fill', '#6a6050')
    .text(d => `«${d.nick}»`);

  // Years
  node.append('text')
    .attr('class', 'node-years')
    .attr('dy', R + 38)
    .text(d => d.died ? `${d.born}–${d.died} AC` : `${d.born} AC`);

  // Store refs
  window._nodes = nodes;
  window._parentL = parentL;
  window._marriageL = marriageL;
}

function updatePositions(isTree) {
  if (!window._nodes) return;
  const nodes = window._nodes;

  window._parentL?.attr('d', d => {
    const s = typeof d.source === 'object' ? d.source : nodes.find(n => n.id === d.source);
    const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target);
    if (!s || !t) return '';
    const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
    return `M${s.x},${s.y} Q${mx},${my - 30} ${t.x},${t.y}`;
  });

  window._marriageL
    ?.attr('x1', d => { const s = typeof d.source === 'object' ? d.source : nodes.find(n => n.id === d.source); return s?.x || 0; })
    .attr('y1', d => { const s = typeof d.source === 'object' ? d.source : nodes.find(n => n.id === d.source); return s?.y || 0; })
    .attr('x2', d => { const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target); return t?.x || 0; })
    .attr('y2', d => { const t = typeof d.target === 'object' ? d.target : nodes.find(n => n.id === d.target); return t?.y || 0; });

  nodeGroup.selectAll('.node')
    .attr('transform', d => `translate(${d.x || 0},${d.y || 0})`);
}

// ============================================================
// MODE SWITCHING
// ============================================================
let currentMode = 'tree';
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnTree').classList.toggle('active', mode === 'tree');
  document.getElementById('btnForce').classList.toggle('active', mode === 'force');
  if (mode === 'tree') buildTreeLayout();
  else buildForceGraph();
}

function resetZoom() {
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(0,0).scale(0.9));
}

// ============================================================
// SIDE PANEL
// ============================================================
function openPanel(d) {
  const panel = document.getElementById('side-panel');
  const content = document.getElementById('panelContent');
  const house = HOUSES[d.house] || HOUSES['—'];

  panel.style.setProperty('--house-color', house.color);
  panel.classList.remove('hidden');

  const status = d.died ? `<span class="status-dead">☽ Погиб ${d.died} AC</span>` : `<span class="status-alive">✦ Жив</span>`;
  const lifespan = d.died ? `${d.died - d.born} лет` : `${305 - d.born}+ лет`;

  content.innerHTML = `
    <div class="panel-house-badge">${house.sigil} Дом ${d.house}</div>
    <div class="panel-name">${d.name}</div>
    ${d.nick ? `<div class="panel-nick">«${d.nick}»</div>` : ''}
    <div class="panel-divider"></div>
    <div class="panel-section-title">Хроника</div>
    <div class="panel-stat"><span class="panel-stat-label">Рождение</span><span class="panel-stat-value">${d.born} AC</span></div>
    <div class="panel-stat"><span class="panel-stat-label">Статус</span><span class="panel-stat-value">${status}</span></div>
    ${d.died ? `<div class="panel-stat"><span class="panel-stat-label">Причина</span><span class="panel-stat-value" style="font-size:12px;color:#a09080">${d.cause}</span></div>` : ''}
    <div class="panel-stat"><span class="panel-stat-label">Прожил</span><span class="panel-stat-value">${lifespan}</span></div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">Титулы</div>
    <div class="panel-titles">${d.titles}</div>
    <div class="panel-divider"></div>
    <div class="panel-section-title">Биография</div>
    <div class="panel-bio">${d.bio}</div>
  `;
}

function closePanel() {
  document.getElementById('side-panel').classList.add('hidden');
}

// ============================================================
// TIMELINE
// ============================================================
function buildTimeline() {
  const tSvg = d3.select('#timeline-svg');
  tSvg.selectAll('*').remove();
  const W = document.getElementById('timeline-container').clientWidth;
  const H = 80;
  const minYear = 225, maxYear = 310;
  const x = d3.scaleLinear().domain([minYear, maxYear]).range([40, W - 40]);
  const laneH = 16;

  // Background grid lines
  for (let y = 230; y <= maxYear; y += 10) {
    tSvg.append('line')
      .attr('x1', x(y)).attr('x2', x(y))
      .attr('y1', 4).attr('y2', H - 16)
      .attr('stroke', 'rgba(201,162,39,0.07)').attr('stroke-width', 1);
    tSvg.append('text')
      .attr('class', 'timeline-label')
      .attr('x', x(y)).attr('y', H - 4)
      .text(y);
  }

  // Main axis line
  tSvg.append('line')
    .attr('x1', x(minYear)).attr('x2', x(maxYear))
    .attr('y1', H / 2).attr('y2', H / 2)
    .attr('stroke', 'rgba(201,162,39,0.2)').attr('stroke-width', 1);

  // Person lifespans - two rows
  persons.forEach((p, i) => {
    if (!p.born) return;
    const row = i % 2;
    const yPos = 12 + row * laneH;
    const x1 = x(p.born);
    const x2 = x(p.died || 305);
    const col = HOUSES[p.house]?.color || '#888';

    tSvg.append('line')
      .attr('x1', x1).attr('x2', x2)
      .attr('y1', yPos + laneH/2).attr('y2', yPos + laneH/2)
      .attr('stroke', col).attr('stroke-width', p.died ? 2 : 3)
      .attr('stroke-opacity', p.died ? 0.5 : 0.8)
      .attr('stroke-linecap', 'round');

    tSvg.append('circle').attr('cx', x1).attr('cy', yPos + laneH/2).attr('r', 2.5)
      .attr('fill', col).attr('opacity', 0.8);
    if (p.died) {
      tSvg.append('circle').attr('cx', x(p.died)).attr('cy', yPos + laneH/2).attr('r', 2.5)
        .attr('fill', '#c0392b').attr('opacity', 0.8);
    }
  });

  // Historical events
  timelineEvents.forEach(ev => {
    tSvg.append('line')
      .attr('x1', x(ev.year)).attr('x2', x(ev.year))
      .attr('y1', 0).attr('y2', H - 16)
      .attr('stroke', ev.color).attr('stroke-width', 1)
      .attr('stroke-opacity', 0.5)
      .attr('stroke-dasharray', '3 3');
  });
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', () => {
  if (currentMode === 'tree') buildTreeLayout();
  buildTimeline();
});

buildTreeLayout();
buildTimeline();
setTimeout(resetZoom, 100);
</script>
