<div class="sp-container">
    <div class="sp-panel" [class.open]="isOpen()">
        <div class="sp-header">Настройки дерева</div>

        <!-- Orientation -->
        <div class="sp-section">
            <div class="sp-row">
                <span class="sp-label">Ориентация</span>
                <div class="sp-btn-group">
                    <button
                        class="sp-btn"
                        [class.active]="settings().orientation === 'vertical'"
                        (click)="update('orientation', 'vertical')"
                        title="Вертикально"
                    >
                        ↕
                    </button>
                    <button
                        class="sp-btn"
                        [class.active]="settings().orientation === 'horizontal'"
                        (click)="update('orientation', 'horizontal')"
                        title="Горизонтально"
                    >
                        ↔
                    </button>
                </div>
            </div>
        </div>

        <!-- Toggles -->
        <div class="sp-section">
            <div class="sp-row">
                <span class="sp-label">Братья и сёстры</span>
                <button
                    class="sp-toggle"
                    [class.on]="settings().showSiblings"
                    (click)="update('showSiblings', !settings().showSiblings)"
                >
                    <span class="sp-toggle-thumb"></span>
                </button>
            </div>
            <div class="sp-row">
                <span class="sp-label">Мини-дерево</span>
                <button
                    class="sp-toggle"
                    [class.on]="settings().miniTree"
                    (click)="update('miniTree', !settings().miniTree)"
                >
                    <span class="sp-toggle-thumb"></span>
                </button>
            </div>
            <div class="sp-row">
                <span class="sp-label">Путь при наведении</span>
                <button
                    class="sp-toggle"
                    [class.on]="settings().hoverPathToMain"
                    (click)="update('hoverPathToMain', !settings().hoverPathToMain)"
                >
                    <span class="sp-toggle-thumb"></span>
                </button>
            </div>
            <div class="sp-row">
                <span class="sp-label">Карточки без пары</span>
                <button
                    class="sp-toggle"
                    [class.on]="settings().singleParentEmptyCard"
                    (click)="update('singleParentEmptyCard', !settings().singleParentEmptyCard)"
                >
                    <span class="sp-toggle-thumb"></span>
                </button>
            </div>
        </div>

        <!-- Depth -->
        <div class="sp-section">
            <div class="sp-row">
                <span class="sp-label">Глубина предков</span>
                <div class="sp-btn-group">
                    <button
                        class="sp-btn"
                        [class.active]="settings().ancestryDepth === null"
                        (click)="update('ancestryDepth', null)"
                    >
                        ∞
                    </button>
                    @for (n of depthSteps; track n) {
                        <button
                            class="sp-btn"
                            [class.active]="settings().ancestryDepth === n"
                            (click)="update('ancestryDepth', n)"
                        >
                            {{ n }}
                        </button>
                    }
                </div>
            </div>
            <div class="sp-row">
                <span class="sp-label">Глубина потомков</span>
                <div class="sp-btn-group">
                    <button
                        class="sp-btn"
                        [class.active]="settings().progenyDepth === null"
                        (click)="update('progenyDepth', null)"
                    >
                        ∞
                    </button>
                    @for (n of depthSteps; track n) {
                        <button
                            class="sp-btn"
                            [class.active]="settings().progenyDepth === n"
                            (click)="update('progenyDepth', n)"
                        >
                            {{ n }}
                        </button>
                    }
                </div>
            </div>
        </div>

        <!-- Spacing -->
        <div class="sp-section">
            <div class="sp-row col">
                <div class="sp-slider-label">
                    <span class="sp-label">Расстояние по X</span>
                    <span class="sp-value">{{ settings().cardXSpacing }}</span>
                </div>
                <input
                    class="sp-slider"
                    type="range"
                    min="220"
                    max="420"
                    step="10"
                    [value]="settings().cardXSpacing"
                    (change)="update('cardXSpacing', +$any($event.target).value)"
                />
            </div>
            <div class="sp-row col">
                <div class="sp-slider-label">
                    <span class="sp-label">Расстояние по Y</span>
                    <span class="sp-value">{{ settings().cardYSpacing }}</span>
                </div>
                <input
                    class="sp-slider"
                    type="range"
                    min="100"
                    max="280"
                    step="10"
                    [value]="settings().cardYSpacing"
                    (change)="update('cardYSpacing', +$any($event.target).value)"
                />
            </div>
        </div>
    </div>

    <button class="sp-gear" [class.open]="isOpen()" (click)="toggle()" title="Настройки">
        ⚙
    </button>
</div>
