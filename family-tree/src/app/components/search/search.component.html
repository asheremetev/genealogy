<div class="search-wrapper">
    <input
        class="search-input"
        type="text"
        placeholder="Поиск..."
        [value]="query()"
        (input)="onInput($event)"
        (focus)="onFocus()"
        (blur)="onBlur()"
    />
    @if (dropdownVisible() && filteredOptions().length > 0) {
        <div class="search-dropdown">
            @for (option of filteredOptions(); track option.value) {
                <div class="search-option" (mousedown)="selectOption(option)">
                    {{ option.label }}
                </div>
            }
        </div>
    }
</div>
